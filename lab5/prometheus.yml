global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    metrics_path: '/service/monitor'
    params:
      format: ['prometheus-untyped']
    static_configs:
      - targets: ['auth-service:8091']
    relabel_configs:
      - target_label: service
        replacement: auth-service

  - job_name: 'inventory-service'
    metrics_path: '/service/monitor'
    params:
      format: ['prometheus-untyped']
    static_configs:
      - targets: ['inventory-service:8092']
    relabel_configs:
      - target_label: service
        replacement: inventory-service

  - job_name: 'booking-service'
    metrics_path: '/service/monitor'
    params:
      format: ['prometheus-untyped']
    static_configs:
      - targets: ['booking-service:8093']
    relabel_configs:
      - target_label: service
        replacement: booking-service
